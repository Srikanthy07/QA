<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="IAST Quality Portal – ASPICE PRM Section Details"/>
  <title id="page-title">IAST Quality Portal – ASPICE PRM</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2300aabb'/><text x='50%' y='68%' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='16' fill='white'>I</text></svg>"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>

  <!-- Reuse existing portal stylesheet -->
  <link rel="stylesheet" href="/css/style.css?v=7"/>

  <!-- Page-specific styles (scoped to this page only) -->
  <style>
    /* ── Page layout ── */
    .sd-page {
      min-height: 100vh;
      background: var(--off-white, #f5f7fa);
      padding-bottom: 60px;
    }

    /* ── Hero / header strip ── */
    .sd-hero {
      background: linear-gradient(135deg, var(--navy, #0d2b45) 0%, var(--navy-mid, #163a5f) 60%, #0f3460 100%);
      border-bottom: 3px solid var(--teal, #00aabb);
      padding: 40px 0 36px;
    }
    .sd-hero__inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Back button ── */
    .sd-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.82);
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, border-color .18s, color .18s;
      margin-bottom: 24px;
    }
    .sd-back:hover {
      background: rgba(0,170,187,.18);
      border-color: var(--teal, #00aabb);
      color: #fff;
    }
    .sd-back svg { width: 14px; height: 14px; }

    /* ── Hero badge + title ── */
    .sd-hero__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .sd-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 56px;
      border-radius: 10px;
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      padding: 0 10px;
      letter-spacing: .04em;
      flex-shrink: 0;
      background: var(--teal, #00aabb); /* overridden by JS */
    }
    .sd-hero__titles { flex: 1; }
    .sd-hero__title {
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin: 0 0 6px;
    }
    .sd-hero__group {
      font-size: .82rem;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Main card container ── */
    .sd-content {
      max-width: 900px;
      margin: 32px auto 0;
      padding: 0 24px;
      display: grid;
      gap: 20px;
    }

    /* ── Section cards ── */
    .sd-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .sd-card__hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid #e8ecf0;
      background: #f9fbfc;
    }
    .sd-card__hdr-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
    }
    .sd-card__hdr-icon--teal  { background: #e0f7fa; color: var(--teal, #00aabb); }
    .sd-card__hdr-icon--navy  { background: #e8edf5; color: var(--navy, #0d2b45); }
    .sd-card__hdr-icon--green { background: #e8f5e9; color: #2e7d32; }
    .sd-card__label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #8a9bb0;
    }
    .sd-card__body { padding: 20px; }

    /* ── Purpose text ── */
    .sd-purpose {
      font-size: .96rem;
      color: #3d4f63;
      line-height: 1.7;
      margin: 0;
    }

    /* ── Outcomes list ── */
    .sd-outcomes {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sd-outcomes li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: .9rem;
      color: #3d4f63;
      line-height: 1.55;
    }
    .sd-outcomes li::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal, #00aabb);
      margin-top: 6px;
      flex-shrink: 0;
    }

    /* ── Documents grid ── */
    .sd-docs-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .sd-doc-card {
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color .18s, box-shadow .18s;
      background: #fff;
    }
    .sd-doc-card:hover {
      border-color: var(--teal, #00aabb);
      box-shadow: 0 3px 12px rgba(0,170,187,.12);
    }
    .sd-doc-badge {
      width: 38px;
      height: 38px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .sd-doc-badge--pdf  { background: #dc2626; }
    .sd-doc-badge--xls  { background: #16a34a; }
    .sd-doc-badge--ppt  { background: #ea580c; }
    .sd-doc-badge--doc  { background: #2563eb; }
    .sd-doc-badge--html { background: #0d2b45; }
    .sd-doc-info { flex: 1; min-width: 0; }
    .sd-doc-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--navy, #0d2b45);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .sd-doc-desc {
      font-size: .75rem;
      color: #6b7f94;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .sd-doc-filename {
      font-size: .7rem;
      color: #9baab8;
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 10px;
      display: block;
    }
    .sd-doc-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    .sd-doc-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity .15s, transform .12s;
    }
    .sd-doc-btn:hover { opacity: .85; transform: translateY(-1px); }
    .sd-doc-btn--view { background: var(--teal, #00aabb); color: #fff; }
    .sd-doc-btn--dl   { background: var(--navy, #0d2b45); color: #fff; }
    .sd-doc-btn svg   { width: 11px; height: 11px; }

    /* ── Empty state ── */
    .sd-docs-empty {
      text-align: center;
      padding: 40px 20px;
      color: #9baab8;
    }
    .sd-docs-empty i { font-size: 2rem; margin-bottom: 10px; display: block; }
    .sd-docs-empty p { font-size: .88rem; margin: 0; }

    /* ── Not-found state ── */
    .sd-not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .sd-not-found h2 {
      font-family: var(--font-head, 'Barlow Condensed', sans-serif);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy, #0d2b45);
      margin-bottom: 10px;
    }
    .sd-not-found p { color: #6b7f94; margin-bottom: 24px; }

    /* ── Loading skeleton ── */
    .sd-skeleton {
      animation: sd-pulse 1.4s ease-in-out infinite;
      background: linear-gradient(90deg, #e8ecf0 25%, #f3f5f7 50%, #e8ecf0 75%);
      background-size: 200% 100%;
      border-radius: 6px;
    }
    @keyframes sd-pulse {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .sd-docs-grid { grid-template-columns: 1fr; }
      .sd-hero { padding: 28px 0 24px; }
      .sd-content { padding: 0 14px; }
      .sd-hero__inner { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- ── Scroll Progress Bar (reuses existing CSS from style.css) ── -->
<div id="scroll-progress-bar"></div>

<!-- ═══════════════════════════════════════════
     NAVBAR — identical to index.html
═══════════════════════════════════════════ -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="navbar__inner">
    <a href="/" class="navbar__brand">
      <img src="/images/logo.webp" alt="IAST Software Solutions" class="navbar__logo"/>
    </a>
    <ul class="navbar__nav" role="list">
      <li><a href="/"                  class="navbar__link">Home</a></li>
      <li><a href="/#vision"           class="navbar__link">Quality Vision</a></li>
      <li><a href="/#culture"          class="navbar__link">Quality Culture</a></li>
      <li><a href="/#gates"            class="navbar__link">Quality Gates</a></li>
      <li><a href="/#issue-management" class="navbar__link">Issue Management</a></li>
      <li><a href="/#prm"              class="navbar__cta navbar__link">ASPICE PRM</a></li>
    </ul>
    <button class="navbar__toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════
     PAGE BODY
═══════════════════════════════════════════ -->
<main class="sd-page" id="sd-page">

  <!-- Hero strip — filled by JS -->
  <div class="sd-hero" id="sd-hero">
    <div class="sd-hero__inner">
      <a href="/#prm" class="sd-back" id="sd-back-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="10 3 5 8 10 13"/>
        </svg>
        Back to ASPICE PRM
      </a>
      <div class="sd-hero__meta">
        <div class="sd-badge" id="sd-hero-badge">…</div>
        <div class="sd-hero__titles">
          <h1 class="sd-hero__title" id="sd-hero-title">Loading…</h1>
          <div class="sd-hero__group" id="sd-hero-group"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main cards — filled by JS -->
  <div class="sd-content" id="sd-content">
    <!-- Rendered dynamically by section-details.js -->
  </div>

</main>

<!-- ═══════════════════════════════════════════
     FOOTER (lightweight — mirrors portal style)
═══════════════════════════════════════════ -->
<footer style="background:var(--navy);color:rgba(255,255,255,.55);text-align:center;padding:22px;font-size:.8rem;">
  &copy; <span id="sd-year"></span> IAST Software Solutions &mdash; Quality Portal
</footer>

<!-- Scripts -->
<script src="/js/section-details.js"></script>

<!-- Navbar mobile toggle (reuse existing logic pattern) -->
<script>
  (function(){
    var toggle = document.querySelector('.navbar__toggle');
    var nav    = document.querySelector('.navbar__nav');
    if (toggle && nav) {
      toggle.addEventListener('click', function(){
        var open = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
    }
    // Scroll progress bar
    var bar = document.getElementById('scroll-progress-bar');
    if (bar) {
      window.addEventListener('scroll', function(){
        var s = document.documentElement;
        var pct = (s.scrollTop / (s.scrollHeight - s.clientHeight)) * 100;
        bar.style.width = pct + '%';
      }, { passive: true });
    }
    // Footer year
    var y = document.getElementById('sd-year');
    if (y) y.textContent = new Date().getFullYear();
  })();
</script>

</body>
</html>
